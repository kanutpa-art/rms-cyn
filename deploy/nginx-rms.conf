# ============================================================
# RMS — nginx config snippet for cyn-jewelry.com
#
# เพิ่มใน server block ของ cyn-jewelry.com (ใน sites-available)
# ตำแหน่งปกติ: /etc/nginx/sites-available/cyn-jewelry.com
#              หรือ /etc/nginx/conf.d/cyn-jewelry.com.conf
#
# RMS รันอยู่ที่ port 3001 บนเครื่องเดียวกัน
# เข้าถึงได้ที่ https://cyn-jewelry.com/RMS
# ============================================================

# --- ใส่ใน server block ที่มีอยู่แล้ว (อย่าสร้าง server block ใหม่) ---

    # RMS: redirect /RMS → /RMS/
    location = /RMS {
        return 301 /RMS/;
    }

    # RMS: proxy ทุก request ที่ขึ้นต้นด้วย /RMS/
    # nginx จะตัด /RMS ออกก่อนส่งให้ Express (trailing slash บน proxy_pass)
    location /RMS/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # เมื่อ Express ส่ง redirect เช่น Location: /admin
        # nginx จะแปลงเป็น Location: /RMS/admin อัตโนมัติ
        proxy_redirect     /  /RMS/;

        # upload ไฟล์ใหญ่ได้ถึง 20MB (สลิป + รูปภาพ)
        client_max_body_size 20M;

        # WebSocket support (ถ้าจำเป็นในอนาคต)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # RMS: Tenant share page — /tenant/{token}
    # URL นี้ส่งให้ผู้เช่าโดยตรง ต้องอยู่นอก /RMS/ เพื่อ URL สั้น
    location ~ ^/tenant/([a-f0-9]+)$ {
        proxy_pass         http://127.0.0.1:3001/tenant/$1;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # RMS: e-signature page — /sign/{token}
    location ~ ^/sign/([^/]+)$ {
        proxy_pass         http://127.0.0.1:3001/sign/$1;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # RMS: tenant share API — /share/{token}/...
    location /share/ {
        proxy_pass         http://127.0.0.1:3001/share/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

# --- จบส่วน RMS ---


