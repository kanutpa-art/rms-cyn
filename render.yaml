services:
  - type: web
    name: rms-cyn
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node scripts/seed.js && node server.js
    # NOTE: persistent disk requires plan: starter ($7/mo)
    # ถ้าต้องการข้อมูลไม่หาย uncomment บรรทัดด้านล่างแล้วเปลี่ยน plan เป็น starter
    # disk:
    #   name: rms-data
    #   mountPath: /data
    #   sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /RMS
      - key: BASE_URL
        value: https://cyn-jewelry.com/RMS
      - key: SESSION_SECRET
        generateValue: true
      - key: SEED_DEMO
        value: "true"
      # DATA_DIR: uncomment เมื่อ mount persistent disk แล้ว
      # - key: DATA_DIR
      #   value: /data
      - key: ADMIN_NAME
        value: เจ้าของหอ
      - key: ADMIN_EMAIL
        value: admin@rms-demo.com
      - key: ADMIN_PASSWORD
        value: demo1234
      - key: DORMITORY_NAME
        value: หอพักสุขใจ (Demo)
